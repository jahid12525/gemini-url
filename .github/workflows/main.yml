name: VanceAI Login Click

on:
  workflow_dispatch:

jobs:
  click-login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11vnc \
            fluxbox \
            chromium-browser \
            python3-pip
          pip3 install playwright --break-system-packages
          python3 -m playwright install chromium
          python3 -m playwright install-deps chromium

      - name: Run automation with virtual display
        env:
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          sleep 2

          python3 << 'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=False,
                      args=["--display=:99", "--no-sandbox", "--disable-dev-shm-usage"]
                  )
                  page = await browser.new_page(viewport={"width": 1280, "height": 900})

                  print("Navigating to vanceai.com...")
                  await page.goto("https://vanceai.com/", wait_until="networkidle")
                  await page.wait_for_timeout(2000)

                  # Take screenshot before clicking
                  await page.screenshot(path="before_click.png")

                  # Check viewport width to decide which button to click
                  viewport_width = await page.evaluate("window.innerWidth")
                  print(f"Viewport width: {viewport_width}")

                  if viewport_width >= 768:
                      # Desktop: click the "Log in" button in the nav
                      print("Desktop layout — clicking Log in button...")
                      login_btn = page.locator('button.text-sm.font-medium.text-zinc-300', has_text="Log in").first
                      await login_btn.wait_for(state="visible", timeout=10000)
                      await login_btn.click()
                  else:
                      # Mobile: click hamburger menu first, then Log in
                      print("Mobile layout — clicking hamburger menu...")
                      hamburger = page.locator('button[aria-label="Toggle menu"]')
                      await hamburger.wait_for(state="visible", timeout=10000)
                      await hamburger.click()
                      await page.wait_for_timeout(800)

                      print("Clicking Log in button in mobile menu...")
                      login_btn = page.locator('button.w-full.rounded-xl', has_text="Log in")
                      await login_btn.wait_for(state="visible", timeout=10000)
                      await login_btn.click()

                  await page.wait_for_timeout(2000)
                  await page.screenshot(path="after_click.png")
                  print("Done. Screenshots saved.")

                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: "*.png"
